# Render Blueprint — https://render.com/docs/blueprint-spec
# Importing this repo as a Blueprint provisions BOTH environments below:
#
#   rated-api          PROD     Records API auth-gated (AGENT_API_TOKEN required)
#   rated-api-staging  STAGING  Records API public (RECORDS_PUBLIC=true) to practice
#
# Each has its own managed Postgres so staging experiments never touch prod data.
# Both auto-deploy from `main`; promote by merging. (To give staging its own
# branch later, set `branch: staging` on the staging service.)

databases:
  - name: rated-db
    plan: free            # free Postgres expires ~30 days; bump to keep it
    region: oregon
  - name: rated-db-staging
    plan: free
    region: oregon

services:
  # ─── PROD — auth-gated ──────────────────────────────────────────────────────
  - type: web
    name: rated-api
    runtime: python
    repo: https://github.com/IamJasonBian/rated
    rootDir: build/backend
    plan: free            # 0.1 CPU / 512 MB RAM, sleeps after 15min idle
    region: oregon
    branch: main
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt
    # Free tier doesn't support preDeployCommand, so run the (idempotent) schema
    # upgrade at boot, right before uvicorn. Safe to re-run on every restart.
    startCommand: alembic upgrade head && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      # Pin Python so prod matches a runtime with prebuilt wheels (psycopg etc.).
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: rated-db
          property: connectionString
      # Machine clients (Claude instances, Airtable-compatible tools) auth the
      # Records API with `Authorization: Bearer <this>`. Render generates a
      # strong random value on first deploy — read it from the dashboard
      # (Environment tab). Comma-separate to issue multiple tokens.
      - key: AGENT_API_TOKEN
        generateValue: true
      # Optional: dedicated HMAC key for pre-signed Records URLs (see
      # build/backend/sign_url.py). Lets signed URLs be revoked by rotating this
      # key without disturbing AGENT_API_TOKEN. If unset, signed URLs fall back
      # to signing with AGENT_API_TOKEN. Set in the dashboard (Environment tab).
      - key: RECORDS_SIGNING_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://silver-salamander-08daf4.netlify.app
      - key: SESSION_TTL_SECONDS
        value: "2592000"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TMDB_API_KEY
        sync: false

  # ─── STAGING — public sandbox ──────────────────────────────────────────────
  - type: web
    name: rated-api-staging
    runtime: python
    repo: https://github.com/IamJasonBian/rated
    rootDir: build/backend
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: rated-db-staging
          property: connectionString
      # Open the Records API — no token needed. This is what makes staging the
      # practice environment. Do NOT set this on prod.
      - key: RECORDS_PUBLIC
        value: "true"
      - key: ALLOWED_ORIGINS
        value: https://silver-salamander-08daf4.netlify.app
      - key: SESSION_TTL_SECONDS
        value: "2592000"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TMDB_API_KEY
        sync: false
